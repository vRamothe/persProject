version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sciencelycee_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sciencelycee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sciencelycee_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sciencelycee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sciencelycee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sciencelycee_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sciencelycee}:${POSTGRES_PASSWORD:-sciencelycee_secret}@db:5432/${POSTGRES_DB:-sciencelycee}
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: sciencelycee_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro

volumes:
  postgres_data:
  static_volume:
  media_volume:

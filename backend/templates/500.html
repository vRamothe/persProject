<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Erreur serveur — ScienceLycée</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-indigo-900 to-purple-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur mb-4">
        <span class="text-3xl">⚗</span>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">ScienceLycée</h1>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
      <div class="text-6xl mb-4">⚠️</div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Erreur serveur</h2>
      <p class="text-sm text-gray-600 mb-6">
        Oups, quelque chose s'est mal passé de notre côté. Réessaie dans quelques instants.
      </p>

      <a href="/"
         class="inline-block py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors shadow-sm">
        Retour à l'accueil
      </a>
    </div>

    <p class="text-center text-xs text-indigo-400 mt-6">
      Plateforme d'apprentissage pour le lycée
    </p>
  </div>
</body>
</html>

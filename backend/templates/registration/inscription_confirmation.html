{% extends "base.html" %}
{% block full_content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-950 via-indigo-900 to-purple-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="{% url 'home' %}" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur mb-4">
        <span class="text-3xl">⚗</span>
      </a>
      <h1 class="text-3xl font-bold text-white tracking-tight">ScienceLycée</h1>
    </div>
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">✉️</span>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-3">Vérifiez votre adresse e-mail</h2>
      <p class="text-gray-600 text-sm mb-6">
        Un lien de confirmation a été envoyé à votre adresse e-mail.<br>
        Cliquez sur le lien pour activer votre compte.<br>
        <span class="text-gray-400 text-xs">(Le lien expire dans 24 h.)</span>
      </p>
      <a href="{% url 'connexion' %}"
         class="inline-block text-sm text-indigo-600 hover:text-indigo-800 font-medium">
        Retour à la connexion
      </a>
    </div>
  </div>
</div>
{% endblock %}
